services:
  nanoidp:
    image: ghcr.io/cdelmonte-zg/nanoidp:latest
    container_name: nanoidp
    ports:
      - "${IDP_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config:ro
      - nanoidp-keys:/app/keys
    environment:
      - NANOIDP_CONFIG_DIR=/app/config
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/.well-known/openid-configuration')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  nanoidp-keys:
    driver: local
